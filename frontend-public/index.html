<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forensic CMS</title>

    <!-- Google Fonts for a professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      /* Reset and base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to bottom right, #1e3a8a, #3b82f6); /* Blue gradient background */
        color: #fff;
      }

      #root {
        width: 100%;
        max-width: 480px;
        background-color: rgba(255, 255, 255, 0.05); /* subtle transparent card */
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 24px;
        color: #f0f9ff;
        text-align: center;
      }

      /* Optional: footer text */
      .footer {
        margin-top: 24px;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
      }

      /* Responsive adjustments */
      @media (max-width: 500px) {
        #root {
          padding: 30px 20px;
        }

        h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <h1>Welcome to Forensic CMS</h1>
      <!-- React app will render below -->
    </div>

    <div class="footer">
      &copy; 2025 Forensic CMS. All rights reserved.
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
